services:
  - type: web
    name: ai-journal-maker
    env: python
    buildCommand: pip install -r journal_maker/requirements_journal.txt
    startCommand: cd journal_maker && uvicorn journal_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    port: 8000
